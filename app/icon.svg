<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Latitude lines -->
  <ellipse cx="16" cy="16" rx="9" ry="3.5" fill="none" stroke="white" stroke-width="0.8"/>
  <ellipse cx="16" cy="16" rx="9" ry="7" fill="none" stroke="white" stroke-width="0.5"/>
  <!-- Longitude line -->
  <ellipse cx="16" cy="16" rx="3.5" ry="9" fill="none" stroke="white" stroke-width="0.8"/>
  <!-- Meridian -->
  <line x1="7" y1="16" x2="25" y2="16" stroke="white" stroke-width="0.8"/>
  <!-- Passport stamp accent -->
  <circle cx="22" cy="10" r="4" fill="#F59E0B" opacity="0.9"/>
  <text x="22" y="11.5" text-anchor="middle" font-size="5" font-weight="bold" fill="white">✓</text>
</svg>
